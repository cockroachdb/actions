name: Autotag from changelog
description: Creates git tags from CHANGELOG.md versions. When there is content under [Unreleased], it fails only if the previous version is not yet tagged.
inputs:
  changelog-path:
    description: Path to the changelog file
    default: CHANGELOG.md
  create-major-tag:
    description: Create/update major version tag (e.g., v1 for v1.2.3). Accepted values are "true" or "false" (case-insensitive).
    default: "true"
outputs:
  tag_created:
    description: Whether a new tag was created ("true" or "false")
    value: ${{ steps.autotag.outputs.tag_created }}
  tag:
    description: The tag that was created (empty if no tag was created)
    value: ${{ steps.autotag.outputs.tag }}
runs:
  using: composite
  steps:
    - id: autotag
      shell: bash
      env:
        CHANGELOG_PATH: ${{ inputs.changelog-path }}
        CREATE_MAJOR_TAG: ${{ inputs.create-major-tag }}
      run: ${{ github.action_path }}/auto-tag-release.sh
