name: Autosolve Assess
description: Run Claude in read-only mode to assess whether a task is suitable for automated resolution.

inputs:
  prompt:
    description: The task to assess. Plain text instructions describing what needs to be done.
    required: false
    default: ""
  skill:
    description: Path to a skill/prompt file relative to the repo root.
    required: false
    default: ""
  additional_instructions:
    description: Extra context appended after the task prompt but before the assessment footer.
    required: false
    default: ""
  assessment_criteria:
    description: Custom criteria for the assessment. If not provided, uses default criteria.
    required: false
    default: ""
  model:
    description: Claude model ID.
    required: false
    default: "claude-opus-4-6"
  blocked_paths:
    description: Comma-separated path prefixes that cannot be modified (injected into security preamble).
    required: false
    default: ".github/workflows/"
  claude_cli_version:
    description: Claude CLI version to install.
    required: false
    default: "2.1.76"

outputs:
  assessment:
    description: PROCEED or SKIP
    value: ${{ steps.outputs.outputs.assessment }}
  summary:
    description: Human-readable assessment reasoning.
    value: ${{ steps.outputs.outputs.summary }}
  result:
    description: Full Claude result text.
    value: ${{ steps.outputs.outputs.result }}

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      run: ${{ github.action_path }}/../run_step.sh shared validate_inputs
      env:
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_SKILL: ${{ inputs.skill }}

    - name: Validate authentication
      shell: bash
      run: ${{ github.action_path }}/../run_step.sh shared validate_auth

    - name: Install Claude CLI
      shell: bash
      run: ${{ github.action_path }}/../run_step.sh shared install_claude
      env:
        CLAUDE_CLI_VERSION: ${{ inputs.claude_cli_version }}

    - name: Build prompt
      id: prompt
      shell: bash
      run: ${{ github.action_path }}/../run_step.sh shared build_prompt
      env:
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_SKILL: ${{ inputs.skill }}
        INPUT_ADDITIONAL_INSTRUCTIONS: ${{ inputs.additional_instructions }}
        INPUT_FOOTER_TYPE: "assessment"
        INPUT_ASSESSMENT_CRITERIA: ${{ inputs.assessment_criteria }}
        INPUT_BLOCKED_PATHS: ${{ inputs.blocked_paths }}

    - name: Run assessment
      id: assess
      shell: bash
      run: ${{ github.action_path }}/../run_step.sh assess run_assessment
      env:
        PROMPT_FILE: ${{ steps.prompt.outputs.prompt_file }}
        INPUT_MODEL: ${{ inputs.model }}

    - name: Set outputs
      id: outputs
      if: always()
      shell: bash
      run: ${{ github.action_path }}/../run_step.sh assess set_assess_outputs
      env:
        ASSESS_RESULT: ${{ steps.assess.outputs.assessment }}

    - name: Cleanup
      if: always()
      shell: bash
      run: rm -rf "${AUTOSOLVE_TMPDIR:-}"
